id: satellite-starter
name: 卫星项目 Starter 版
core: "0.1"
profile: zh
capabilities:
  - starter-outputs
  - main-repo-sync
  - skill-mount
role_overrides:
  system.context.project_status: _系统/上下文/当前项目.md
formal_source_default: 输出/确认成果/
description: >
  面向接入主库的轻量卫星项目。主库提供 identity、lessons、
  .internal、knowledge、skills 和 registry 协同机制；卫星项目维护
  自己的状态、当前工作、参考资料、草稿和确认成果。
